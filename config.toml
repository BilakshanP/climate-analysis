# Multi-city temperature & rainfall analysis
# See HANDOFF.md for full documentation

start_year = 1951
end_year = 2025
timezone = "UTC"

# sort_by = "lat"    # "lat" (lon secondary) | "lon" (lat secondary) | omit for idx/alphabetical
# sort_order = "asc" # "asc" (default) | "desc"

[output]
png = true
svg = true
png_dpi = 100

# Each city needs: lat, lon
# Optional: idx (ordering position, 1-based), color (name or #hex)

[cities.London]
lat = 51.5074
lon = -0.1278
color = "steelblue"

